# Defaults can be found here: https://github.com/bbatsov/rubocop/blob/master/config/default.yml

plugins:
  - rubocop-rspec
  - rubocop-rake
  - rubocop-performance

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable

Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: consistent_comma

Style/RegexpLiteral:
  Enabled: true
  EnforcedStyle: slashes

RSpec/ExampleLength:
  Enabled: true
  Max: 40

Style/BlockDelimiters:
  Enabled: true
  EnforcedStyle: always_braces
  Exclude:
    - spec/**/*.rb
    - Guardfile
    - Rakefile
    - gems/*/*.gemspec

Metrics/ModuleLength:
  Enabled: true
  Exclude:
    - spec/**/*.rb
    # The Swift manifest parser is a cohesive, stateful parser; splitting it only
    # to satisfy a line-count metric would make the implementation harder to read.
    - gems/spm_version_updates/lib/spm_version_updates/manifest_parser.rb

Layout/ClassStructure:
  Enabled: true

Layout/MultilineArrayLineBreaks:
  Enabled: true

Layout/MultilineAssignmentLayout:
  Enabled: true
  EnforcedStyle: same_line

Layout/MultilineHashKeyLineBreaks:
  Enabled: true

Layout/MultilineMethodArgumentLineBreaks:
  Enabled: true

Layout/MultilineMethodParameterLineBreaks:
  Enabled: true

Layout/SingleLineBlockChain:
  Enabled: true

Style/AutoResourceCleanup:
  Enabled: true

Style/CollectionMethods:
  Enabled: true

Style/InvertibleUnlessCondition:
  Enabled: true

Style/MethodCallWithArgsParentheses:
  Enabled: true
  Exclude:
    - spec/**/*.rb

Style/MethodCalledOnDoEndBlock:
  Enabled: true

Style/RequireOrder:
  Enabled: true

Style/StringMethods:
  Enabled: true

Style/TopLevelMethodDefinition:
  Enabled: true
  Exclude:
    - spec/plugin/*.rb

Style/ModuleFunction:
  EnforcedStyle: forbidden

Style/StringLiterals:
  EnforcedStyle: double_quotes
  Enabled: true

# kind_of? is a good way to check a type
Style/ClassCheck:
  EnforcedStyle: kind_of?

Layout/FirstHashElementIndentation:
  Enabled: true

Layout/HashAlignment:
  Enabled: true

# Cop supports --auto-correct.
Lint/UnusedBlockArgument:
  Enabled: true

Metrics/AbcSize:
  Max: 40

# The %w might be confusing for new users
Style/WordArray:
  MinSize: 19

Style/AndOr:
  Enabled: true

# Configuration parameters: CountComments.
Metrics/ClassLength:
  Max: 320
  CountAsOne:
    - array
    - method_call

Metrics/CyclomaticComplexity:
  Max: 16

# Configuration parameters: AllowURI, URISchemes.
Layout/LineLength:
  Max: 180

# Configuration parameters: CountKeywordArgs.
Metrics/ParameterLists:
  Max: 5

Metrics/PerceivedComplexity:
  Max: 17

Style/GuardClause:
  Enabled: true

Style/ConditionalAssignment:
  Enabled: true

Metrics/MethodLength:
  Max: 45

Layout/MultilineMethodCallIndentation:
  EnforcedStyle: indented

Metrics/BlockLength:
  Max: 80
  AllowedMethods:
    - describe
    - context
    - shared_examples

Style/MixinGrouping:
  Enabled: true

Naming/RescuedExceptionsVariableName:
  PreferredName: error

Style/PercentLiteralDelimiters:
  PreferredDelimiters:
    "%": ()
    "%i": ()
    "%q": ()
    "%Q": ()
    "%r": "{}"
    "%s": ()
    "%w": ()
    "%W": ()
    "%x": ()

Gemspec/DevelopmentDependencies:
  Enabled: false

Performance:
  Enabled: true
