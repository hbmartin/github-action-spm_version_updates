name: Push Gem

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: gem-release
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      # Set up
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Ruby
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          ruby-version: ruby

      # Verify the pushed tag matches the gem version constant before anything
      # is published, so a mistagged release fails fast.
      - name: Verify tag matches gem version
        run: |
          set -euo pipefail
          version="$(ruby -e 'require "./gems/spm_version_updates/lib/spm_version_updates/version"; print SpmVersionUpdates::VERSION')"
          if [ "$GITHUB_REF_NAME" != "v${version}" ]; then
            echo "::error::Pushed tag ${GITHUB_REF_NAME} does not match gem version v${version} (gems/spm_version_updates/lib/spm_version_updates/version.rb)"
            exit 1
          fi

      - name: Install core gem bundle
        working-directory: gems/spm_version_updates
        run: bundle install

      - name: Install plugin gem bundle
        working-directory: gems/danger-spm_version_updates
        run: bundle install

      # RubyGems forbids re-pushing an existing version, so a retry after a
      # partial release (e.g. core published, plugin failed) must skip the
      # gems that already made it.
      - name: Determine which gems still need publishing
        id: pending
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          for entry in "core:spm_version_updates" "plugin:danger-spm_version_updates"; do
            key="${entry%%:*}"
            gem="${entry#*:}"
            # A brand-new gem 404s on the versions endpoint; treat as unpublished.
            if (curl -fsSL "https://rubygems.org/api/v1/versions/${gem}.json" || echo "[]") \
                | jq -e --arg v "$version" 'any(.[]; .number == $v)' >/dev/null; then
              echo "${gem} ${version} is already on RubyGems; skipping its release."
              echo "${key}=false" >> "$GITHUB_OUTPUT"
            else
              echo "${key}=true" >> "$GITHUB_OUTPUT"
            fi
          done

      # Release the core gem first and wait for it to propagate, so the plugin
      # gem's runtime dependency on it is resolvable as soon as it publishes.
      - name: Release spm_version_updates
        if: ${{ steps.pending.outputs.core == 'true' }}
        uses: rubygems/release-gem@052cc82692552de3ef2b81fd670e41d13cba8092 # v1.4.0
        with:
          working-directory: gems/spm_version_updates
          await-release: true

      # Each release-gem invocation exchanges its own OIDC token, and
      # configure-rubygems-credentials refuses to overwrite an existing
      # ~/.gem/credentials key, so the first invocation's credentials must be
      # cleared before the second one runs.
      - name: Reset RubyGems credentials between releases
        if: ${{ steps.pending.outputs.plugin == 'true' }}
        run: rm -f ~/.gem/credentials

      - name: Release danger-spm_version_updates
        if: ${{ steps.pending.outputs.plugin == 'true' }}
        uses: rubygems/release-gem@052cc82692552de3ef2b81fd670e41d13cba8092 # v1.4.0
        with:
          working-directory: gems/danger-spm_version_updates

      # The floating major tag (e.g. v1) is moved by move_major_tag.yml when
      # the GitHub release is published, after verifying both gems are live
      # on RubyGems at the release version.
