name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v4.3.1
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Install Semgrep
        run: python3 -m pip install --user semgrep==1.151.0
      - name: Run Semgrep
        run: |
          "$HOME/.local/bin/semgrep" --config .semgrep.yml --error
      - name: Run RuboCop
        run: bundle exec rubocop
      - name: Run Reek
        run: bundle exec rake reek
      # Catches doc drift before release: a broken docs build, YARD warnings,
      # undocumented classes/modules, or a coverage regression all fail here
      # instead of at tag time in docs.yml.
      - name: Build docs site and check documentation
        run: bundle exec rake docs docs:check
      - name: Run Danger plugin lint
        working-directory: gems/danger-spm_version_updates
        env:
          BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile
        run: bundle exec danger plugins lint
      # Rehearse the release path: push_gem.yml runs `bundle exec rake release`
      # per gem directory against each gem's own Gemfile, so a missing dev
      # dependency or broken gemspec must fail here, not at tag time.
      - name: Verify gem release tooling
        run: |
          set -euo pipefail
          for dir in gems/spm_version_updates gems/danger-spm_version_updates; do
            echo "::group::${dir}"
            (cd "$dir" && BUNDLE_GEMFILE=Gemfile bundle install && BUNDLE_GEMFILE=Gemfile bundle exec rake build)
            echo "::endgroup::"
          done
      # The action's frozen install on runners records the path gem's version,
      # so a stale action/Gemfile.lock breaks every action run after a bump.
      - name: Verify action lockfile matches gem version
        run: |
          set -euo pipefail
          version="$(ruby -e 'require "./gems/spm_version_updates/lib/spm_version_updates/version"; print SpmVersionUpdates::VERSION')"
          expected="    spm_version_updates (${version})"
          if ! grep -qxF "$expected" action/Gemfile.lock; then
            echo "::error file=action/Gemfile.lock::action/Gemfile.lock does not record spm_version_updates ${version}; run 'cd action && bundle lock'"
            exit 1
          fi
      - name: Run actionlint
        uses: docker://rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667 # 1.7.12
        with:
          args: -color
      - name: Validate action.yml schema
        run: npx --yes @action-validator/cli@0.6.0 action.yml

  build:
    name: Action specs
    strategy:
      fail-fast: false
      matrix:
        ruby-version:
          - "3.2"
          - "3.3"
          - "3.4"
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v4.3.1
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - name: Run specs
        env:
          SIMPLECOV_MINIMUM_COVERAGE: "80"
        run: bundle exec rspec --require ./spec/coverage_helper
      # Layering guard: the core gem and its specs must load with no danger,
      # octokit, or other action/plugin dependencies in the bundle.
      - name: Run core specs in isolation
        env:
          BUNDLE_GEMFILE: ${{ github.workspace }}/gems/spm_version_updates/Gemfile
        run: |
          bundle install
          bundle exec rspec spec/core
      # xcodeproj is documented as optional (Xcode-project mode only, loaded
      # lazily); requiring the umbrella file must succeed with xcodeproj
      # excluded from the load path.
      - name: Verify core gem loads without xcodeproj
        env:
          BUNDLE_GEMFILE: ${{ github.workspace }}/gems/spm_version_updates/Gemfile
          BUNDLE_WITHOUT: development:test
        run: bundle exec ruby -e 'require "spm_version_updates"'
      - name: Upload coverage report
        if: always()
        # actions/upload-artifact v4.6.2
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-ruby-${{ matrix.ruby-version }}
          path: coverage/
          if-no-files-found: error
