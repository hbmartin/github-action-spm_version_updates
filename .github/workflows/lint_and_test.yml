name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v4.3.1
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Ruby
        # ruby/setup-ruby v1.310.0
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Install Semgrep
        run: python3 -m pip install --user semgrep==1.151.0
      - name: Run Semgrep
        run: $HOME/.local/bin/semgrep --config .semgrep.yml --error
      - name: Run RuboCop
        run: bundle exec rubocop
      - name: Run Reek
        run: bundle exec rake reek
      - name: Run Danger plugin lint
        run: bundle exec danger plugins lint

  build:
    name: Action specs
    strategy:
      fail-fast: false
      matrix:
        ruby-version:
          - "3.2"
          - "3.3"
          - "3.4"
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v4.3.1
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Ruby ${{ matrix.ruby-version }}
        # ruby/setup-ruby v1.310.0
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - name: Run specs
        run: bundle exec rspec --require ./spec/coverage_helper
      - name: Upload coverage report
        if: always()
        # actions/upload-artifact v4.6.2
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-ruby-${{ matrix.ruby-version }}
          path: coverage/
          if-no-files-found: error
