rules:
  - id: ruby.credential-redactor.no-explicit-nil-return
    languages:
      - ruby
    severity: ERROR
    message: >-
      Avoid explicit nil-return guards in CredentialRedactor.redact; they trigger
      Reek's NilCheck. Use nil-preserving safe navigation or another expression
      form instead.
    paths:
      include:
        - "**/lib/credential_redactor.rb"
    patterns:
      - pattern-either:
          - pattern-inside: |
              def redact($VALUE)
                ...
              end
          - pattern-inside: |
              def self.redact($VALUE)
                ...
              end
      - pattern-either:
          - pattern: return nil if $VALUE.nil?
          - pattern: |
              if $VALUE.nil?
                return nil
              end
  - id: semgrep.paths-include.no-leading-slash
    languages:
      - yaml
    severity: ERROR
    message: Semgrep paths.include entries are relative to the scan root and must not start with /.
    paths:
      include:
        - .semgrep.yml
    patterns:
      - pattern-inside: |
          paths:
            include:
              ...
      - pattern: |
          - $PATH
      - metavariable-regex:
          metavariable: $PATH
          regex: ^/.*
  - id: ruby.gemspec.git-ls-files-requires-enoent-rescue
    languages:
      - ruby
    severity: ERROR
    message: Wrap gemspec git ls-files shell calls in an Errno::ENOENT rescue so packaging works when git is unavailable.
    paths:
      include:
        - "*.gemspec"
    patterns:
      - pattern-either:
          - pattern: "`git ls-files ...`"
          - pattern: "%x(git ls-files ...)"
      - pattern-not-inside: |
          begin
            ...
          rescue Errno::ENOENT
            ...
          end
  - id: ruby.github-integration.tracking-issue-no-resource-fetch
    languages:
      - ruby
    severity: ERROR
    message: >-
      TrackingIssue works with Octokit/Sawyer resources; use [] access instead
      of fetch because Sawyer::Resource does not implement fetch.
    paths:
      include:
        - "**/lib/github_integration.rb"
    patterns:
      - pattern-inside: |
          class TrackingIssue
            ...
          end
      - pattern: $RESOURCE.fetch(...)
  - id: ruby.spm-checker.no-unguarded-lookup-handler-call
    languages:
      - ruby
    severity: ERROR
    message: >-
      Guard lookup_failure_handler before calling it for prefetch failures; raise
      the original error when no handler is configured.
    paths:
      include:
        - "**/lib/spm_checker.rb"
    patterns:
      - pattern-either:
          - pattern: next @lookup_failure_handler.call($PACKAGE, $ERROR) if $ERROR
          - pattern: |
              if $ERROR
                next @lookup_failure_handler.call($PACKAGE, $ERROR)
              end
