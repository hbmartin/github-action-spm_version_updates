rules:
  - id: ruby.credential-redactor.no-explicit-nil-return
    languages:
      - ruby
    severity: ERROR
    message: >-
      Avoid explicit nil-return guards in CredentialRedactor.redact; they trigger
      Reek's NilCheck. Use nil-preserving safe navigation or another expression
      form instead.
    paths:
      include:
        - "**/credential_redactor.rb"
    patterns:
      - pattern-either:
          - pattern-inside: |
              def redact($VALUE)
                ...
              end
          - pattern-inside: |
              def self.redact($VALUE)
                ...
              end
      - pattern-either:
          - pattern: return nil if $VALUE.nil?
          - pattern: |
              if $VALUE.nil?
                return nil
              end
  - id: semgrep.paths-include.no-leading-slash
    languages:
      - yaml
    severity: ERROR
    message: Semgrep paths.include entries are relative to the scan root and must not start with /.
    paths:
      include:
        - .semgrep.yml
    patterns:
      - pattern-inside: |
          paths:
            include:
              ...
      - pattern: |
          - $PATH
      - metavariable-regex:
          metavariable: $PATH
          regex: ^/.*
  - id: semgrep.paths-include.protected-ruby-files-require-recursive-glob
    languages:
      - yaml
    severity: ERROR
    message: Use recursive globs for protected Ruby file includes so rules keep matching after repo moves.
    paths:
      include:
        - .semgrep.yml
    patterns:
      - pattern-inside: |
          paths:
            include:
              ...
      - pattern: |
          - $PATH
      - metavariable-regex:
          metavariable: $PATH
          regex: ^(?!\*\*/)(?:.+/)?(credential_redactor|github_integration|spm_checker)\.rb$
  - id: ruby.gemspec.git-ls-files-requires-enoent-rescue
    languages:
      - ruby
    severity: ERROR
    message: Wrap gemspec git ls-files shell calls in an Errno::ENOENT rescue so packaging works when git is unavailable.
    paths:
      include:
        - "**/*.gemspec"
    patterns:
      - pattern-either:
          - pattern: "`git ls-files ...`"
          - pattern: "%x(git ls-files ...)"
      - pattern-not-inside: |
          begin
            ...
          rescue Errno::ENOENT
            ...
          end
  - id: ruby.gemspec.no-shell-interpolated-git-c
    languages:
      - generic
    severity: ERROR
    message: >-
      Use argv-style process execution or Shellwords.escape for gemspec git -C
      calls; interpolated shell commands split paths with spaces and can
      misparse metacharacters.
    paths:
      include:
        - "**/*.gemspec"
    patterns:
      - pattern-regex: 'git\s+-C\s+#\{[^}]+\}'
  - id: ruby.github-integration.tracking-issue-no-resource-fetch
    languages:
      - ruby
    severity: ERROR
    message: >-
      TrackingIssue works with Octokit/Sawyer resources; use [] access instead
      of fetch because Sawyer::Resource does not implement fetch.
    paths:
      include:
        - "**/github_integration.rb"
    patterns:
      - pattern-inside: |
          class TrackingIssue
            ...
          end
      - pattern: $RESOURCE.fetch(...)
  - id: ruby.spm-checker.no-unguarded-lookup-handler-call
    languages:
      - ruby
    severity: ERROR
    message: >-
      Guard lookup_failure_handler before calling it for prefetch failures; raise
      the original error when no handler is configured.
    paths:
      include:
        - "**/spm_checker.rb"
    patterns:
      - pattern-either:
          - pattern: next @lookup_failure_handler.call($PACKAGE, $ERROR) if $ERROR
          - pattern: |
              if $ERROR
                next @lookup_failure_handler.call($PACKAGE, $ERROR)
              end
  - id: ruby.performance.no-array-as-membership-set
    languages:
      - ruby
    severity: ERROR
    message: Use a Hash or Set when a collection is only used for membership checks and inserts.
    paths:
      include:
        - "**/*.rb"
    patterns:
      - pattern: |
          return if $COLLECTION.include?($KEY)
          ...
          $COLLECTION << $KEY
  - id: ruby.source.no-invisible-unicode
    languages:
      - generic
    severity: ERROR
    message: Use explicit Unicode escape sequences instead of invisible Unicode characters in Ruby source.
    paths:
      include:
        - "**/*.rb"
    patterns:
      - pattern-regex: '[\x{200B}\x{200C}\x{200D}\x{FEFF}]'
  - id: ruby.github-integration.no-unbounded-issue-pagination
    languages:
      - ruby
    severity: ERROR
    message: Bound GitHub issue pagination so API anomalies cannot create unbounded loops.
    paths:
      include:
        - "**/action/lib/github_integration.rb"
    patterns:
      - pattern-inside: |
          class TrackingIssue
            ...
          end
      - pattern-either:
          - pattern: |
              1.step { |$PAGE|
                ...
                $CLIENT.list_issues(...)
                ...
              }
          - pattern: |
              loop do
                ...
                $CLIENT.list_issues(...)
                ...
              end
  - id: html.remote-artifact-requires-sri
    languages:
      - generic
    severity: ERROR
    message: Remote scripts and stylesheets must include Subresource Integrity.
    paths:
      include:
        - "**/*.erb"
        - "**/*.html"
    patterns:
      - pattern-either:
          - pattern-regex: '<script\b(?=[^>]*\bsrc\s*=\s*["''](?:https?:)?//)(?![^>]*\bintegrity\s*=)[^>]*>'
          - pattern-regex: '<link\b(?=[^>]*\bhref\s*=\s*["''](?:https?:)?//)(?=[^>]*\brel\s*=\s*["'']stylesheet["''])(?![^>]*\bintegrity\s*=)[^>]*>'
