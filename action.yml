name: 'Swift Package Version Updates'
description: 'Report available Swift Package Manager dependency updates from Package.swift manifests or Xcode projects'
author: 'hbmartin'
branding:
  icon: 'package'
  color: 'orange'

inputs:
  xcode-project-path:
    description: 'Xcode mode: path to the .xcodeproj file. Mutually exclusive with package-manifest-paths and package-resolved-paths-only mode.'
    required: false
    default: ''
  package-manifest-paths:
    description: 'Manifest mode: newline-separated Package.swift paths. Mutually exclusive with xcode-project-path.'
    required: false
    default: ''
  package-resolved-paths:
    description: 'Newline-separated Package.resolved paths. With package-manifest-paths, overrides default adjacent resolved files; alone, activates Package.resolved-only mode.'
    required: false
    default: ''
  check-when-exact:
    description: 'Include exact version constraints when checking for updates'
    required: false
    default: 'false'
  check-branches:
    description: 'Check branch-pinned dependencies for newer commits'
    required: false
    default: 'true'
  check-revisions:
    description: 'Report the latest tagged release for revision-pinned dependencies'
    required: false
    default: 'false'
  report-above-maximum:
    description: 'Also report versions above the maximum allowed constraint range'
    required: false
    default: 'false'
  report-pre-releases:
    description: 'Include pre-release versions when choosing available updates'
    required: false
    default: 'false'
  ignore-repos:
    description: 'Comma-separated repository URLs to skip before any git lookup'
    required: false
    default: ''
  repo-rules-path:
    description: 'Path to a YAML file with per-repository semantic update suppression rules'
    required: false
    default: ''
  allow-hosts:
    description: 'Comma-separated git remote hostnames allowed for version lookups. Empty allows any host for allowed git protocols.'
    required: false
    default: ''
  version-lookup-workers:
    description: 'Maximum concurrent git tag lookups. Must be a positive integer.'
    required: false
    default: '4'
  allow-missing-resolved:
    description: 'When true, missing Package.resolved files are reported as warnings instead of failing the run.'
    required: false
    default: 'false'
  apply-updates:
    description: 'Rewrite supported Package.swift version requirements in the workspace. Manifest mode only; pair with a pull-request creation step.'
    required: false
    default: 'false'
  enrich-release-notes:
    description: 'Fetch GitHub release notes for updated packages and include them in PR comments or tracking issues.'
    required: false
    default: 'true'
  fail-on:
    description: 'Fail when updates are found: true/any for any update, major/minor/patch for semantic updates at or above that severity, or empty/false/none to never fail.'
    required: false
    default: ''
  comment:
    description: 'Post or update the pull request comment. Set false to disable all PR commenting; outputs, the step summary, and annotations are still produced, and a comment left by a prior run is kept as-is rather than deleted. Tracking issues (open-tracking-issue) are unaffected.'
    required: false
    default: 'true'
  comment-on-success:
    description: 'Post an up-to-date pull request comment on clean runs. By default, clean runs delete the prior generated comment instead.'
    required: false
    default: 'false'
  open-tracking-issue:
    description: 'On runs without a pull request context (schedule, workflow_dispatch, push), open or update a single tracking issue with the update report, and close it when everything is up to date. Requires issues: write permission.'
    required: false
    default: 'false'
  cache-version-tags:
    description: 'Cache git tag lookup results with actions/cache to make repeated runs faster'
    required: false
    default: 'true'
  version-tags-cache-ttl:
    description: 'Freshness window, in seconds, for persisted git tag lookups. Must be a non-negative integer; set 0 to disable persistent cache reads and writes.'
    required: false
    default: '21600'
  setup-ruby:
    description: 'Set up Ruby and install this action bundle. Set false only for later invocations in the same job after an earlier invocation has already run setup.'
    required: false
    default: 'true'
  github-token:
    description: 'Token used to create or update pull request comments. Defaults to github.token.'
    required: false
    default: ${{ github.token }}

outputs:
  updates-found:
    description: 'Number of dependency updates found'
    value: ${{ steps.check.outputs.updates-found }}
  major-updates-found:
    description: 'Number of major semantic-version updates found'
    value: ${{ steps.check.outputs.major-updates-found }}
  minor-updates-found:
    description: 'Number of minor semantic-version updates found'
    value: ${{ steps.check.outputs.minor-updates-found }}
  patch-updates-found:
    description: 'Number of patch semantic-version updates found'
    value: ${{ steps.check.outputs.patch-updates-found }}
  parse-warnings:
    description: 'Number of .package(...) declarations that could not be parsed and were skipped. Not counted in updates-found and never fails the run, but skipped declarations are listed in the step summary and PR comment with a link to open an issue — a PR comment is posted even when no updates were found so skips are never silent.'
    value: ${{ steps.check.outputs.parse-warnings }}
  missing-resolved:
    description: 'Number of missing Package.resolved files reported when allow-missing-resolved is true'
    value: ${{ steps.check.outputs.missing-resolved }}
  applied-updates:
    description: 'Number of Package.swift requirement updates applied when apply-updates is true'
    value: ${{ steps.check.outputs.applied-updates }}
  applied-updates-json:
    description: 'JSON array of applied Package.swift update records. Empty array when apply-updates is false or nothing was applied.'
    value: ${{ steps.check.outputs.applied-updates-json }}
  updates-json:
    description: 'JSON array of update objects. Each object has a message field and, when available, structured fields such as type, package, repository_url, current_version, available_version, severity, note, source, requirement_kind, package_identity, suggested_command, and suggested_requirement.'
    value: ${{ steps.check.outputs.updates-json }}
  blocked:
    description: 'Whether the run was blocked before version lookup by a security gate such as allow-hosts'
    value: ${{ steps.check.outputs.blocked }}
  error-message:
    description: 'Failure message when blocked is true'
    value: ${{ steps.check.outputs.error-message }}
  tracking-issue-number:
    description: 'Number of the tracking issue created or updated, when open-tracking-issue is enabled and the run had no pull request context. Empty otherwise.'
    value: ${{ steps.check.outputs.tracking-issue-number }}
  tracking-issue-url:
    description: 'HTML URL of the tracking issue created or updated. Empty otherwise.'
    value: ${{ steps.check.outputs.tracking-issue-url }}

runs:
  using: 'composite'
  steps:
    - name: Set up action runtime
      if: ${{ inputs.setup-ruby == 'true' }}
      uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
      env:
        BUNDLE_WITHOUT: development:test${{ inputs.xcode-project-path == '' && ':xcode' || '' }}
      with:
        ruby-version: '3.3'
        bundler-cache: true
        working-directory: ${{ github.action_path }}/action

    - name: Prepare git tag cache
      id: version-tags-cache
      if: ${{ inputs.cache-version-tags == 'true' && inputs.version-tags-cache-ttl != '0' }}
      shell: bash
      env:
        CACHE_REPOSITORY_ID: ${{ github.repository_id }}
      run: |
        set -euo pipefail
        cache_day="$(date -u +%Y%m%d)"
        cache_repo="${CACHE_REPOSITORY_ID:-${GITHUB_REPOSITORY:-repository}}"
        cache_dir="${RUNNER_TEMP}/spm-version-updates-tags"
        cache_key="spm-version-updates-tags-${RUNNER_OS}-${cache_repo}-${cache_day}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
        today_restore_key="spm-version-updates-tags-${RUNNER_OS}-${cache_repo}-${cache_day}-"
        restore_key="spm-version-updates-tags-${RUNNER_OS}-${cache_repo}-"

        mkdir -p "$cache_dir"
        echo "SPM_VERSION_UPDATES_TAG_CACHE_DIR=$cache_dir" >> "$GITHUB_ENV"
        echo "path=$cache_dir" >> "$GITHUB_OUTPUT"
        echo "key=$cache_key" >> "$GITHUB_OUTPUT"
        echo "today-restore-key=$today_restore_key" >> "$GITHUB_OUTPUT"
        echo "restore-key=$restore_key" >> "$GITHUB_OUTPUT"

    - name: Restore git tag cache
      if: ${{ inputs.cache-version-tags == 'true' && inputs.version-tags-cache-ttl != '0' }}
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ steps.version-tags-cache.outputs.path }}
        key: ${{ steps.version-tags-cache.outputs.key }}
        restore-keys: |
          ${{ steps.version-tags-cache.outputs.today-restore-key }}
          ${{ steps.version-tags-cache.outputs.restore-key }}

    - name: Check Swift package updates
      id: check
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        BUNDLE_WITHOUT: development:test${{ inputs.xcode-project-path == '' && ':xcode' || '' }}
        INPUT_XCODE_PROJECT_PATH: ${{ inputs.xcode-project-path }}
        INPUT_PACKAGE_MANIFEST_PATHS: ${{ inputs.package-manifest-paths }}
        INPUT_PACKAGE_RESOLVED_PATHS: ${{ inputs.package-resolved-paths }}
        INPUT_CHECK_WHEN_EXACT: ${{ inputs.check-when-exact }}
        INPUT_CHECK_BRANCHES: ${{ inputs.check-branches }}
        INPUT_CHECK_REVISIONS: ${{ inputs.check-revisions }}
        INPUT_REPORT_ABOVE_MAXIMUM: ${{ inputs.report-above-maximum }}
        INPUT_REPORT_PRE_RELEASES: ${{ inputs.report-pre-releases }}
        INPUT_IGNORE_REPOS: ${{ inputs.ignore-repos }}
        INPUT_REPO_RULES_PATH: ${{ inputs.repo-rules-path }}
        INPUT_ALLOW_HOSTS: ${{ inputs.allow-hosts }}
        INPUT_VERSION_LOOKUP_WORKERS: ${{ inputs.version-lookup-workers }}
        INPUT_ALLOW_MISSING_RESOLVED: ${{ inputs.allow-missing-resolved }}
        INPUT_APPLY_UPDATES: ${{ inputs.apply-updates }}
        INPUT_ENRICH_RELEASE_NOTES: ${{ inputs.enrich-release-notes }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_COMMENT: ${{ inputs.comment }}
        INPUT_COMMENT_ON_SUCCESS: ${{ inputs.comment-on-success }}
        INPUT_OPEN_TRACKING_ISSUE: ${{ inputs.open-tracking-issue }}
        INPUT_CACHE_VERSION_TAGS: ${{ inputs.cache-version-tags }}
        INPUT_VERSION_TAGS_CACHE_TTL: ${{ inputs.version-tags-cache-ttl }}
        INPUT_SETUP_RUBY: ${{ inputs.setup-ruby }}
        SPM_VERSION_UPDATES_TAG_CACHE_DIR: ${{ steps.version-tags-cache.outputs.path }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        cd "$ACTION_PATH/action"
        bash "$ACTION_PATH/action/action_runtime_preflight.sh"
        bundle exec ruby "$ACTION_PATH/action/lib/action.rb"

    - name: Save git tag cache
      if: ${{ always() && inputs.cache-version-tags == 'true' && inputs.version-tags-cache-ttl != '0' }}
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ steps.version-tags-cache.outputs.path }}
        key: ${{ steps.version-tags-cache.outputs.key }}
