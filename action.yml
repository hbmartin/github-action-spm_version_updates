name: 'SPM Version Updates'
description: 'Check for available updates to Swift Package Manager dependencies in Xcode projects or Package.swift manifests'
author: 'hbmartin'
branding:
  icon: 'package'
  color: 'orange'

inputs:
  xcode-project-path:
    description: 'Path to the Xcode project file (.xcodeproj). Provide this OR package-manifest-paths.'
    required: false
    default: ''
  package-manifest-paths:
    description: 'Newline-separated list of Package.swift manifest paths. Provide this OR xcode-project-path.'
    required: false
    default: ''
  package-resolved-paths:
    description: 'Optional newline-separated list of Package.resolved paths. Defaults to a Package.resolved next to each manifest.'
    required: false
    default: ''
  check-when-exact:
    description: 'Check for updates even when using exact version constraints'
    required: false
    default: 'false'
  check-branches:
    description: 'Check for newer commits on branch-pinned dependencies'
    required: false
    default: 'true'
  check-revisions:
    description: 'Report the latest tagged version for revision-pinned dependencies'
    required: false
    default: 'false'
  report-above-maximum:
    description: 'Report versions above the maximum constraint range'
    required: false
    default: 'false'
  report-pre-releases:
    description: 'Include pre-release versions in update reports'
    required: false
    default: 'false'
  ignore-repos:
    description: 'Comma-separated list of repository URLs to ignore'
    required: false
    default: ''
  repo-rules-path:
    description: 'Path to a YAML file with per-repository semantic update suppression rules'
    required: false
    default: ''
  allow-hosts:
    description: 'Comma-separated list of git remote hostnames allowed for version lookups. Empty allows any host for allowed git protocols.'
    required: false
    default: ''
  fail-on-updates:
    description: 'Legacy fail behavior. Set true to fail on any update, or major/minor/patch to fail on semantic version updates at or above that severity.'
    required: false
    default: 'false'
  fail-on:
    description: 'Fail on semantic version updates at or above this severity: major, minor, or patch. Overrides fail-on-updates when set.'
    required: false
    default: ''
  comment-on-success:
    description: 'Post a pull request comment when all dependencies are up to date'
    required: false
    default: 'false'
  cache-version-tags:
    description: 'Persist successful git tag lookups between runs with actions/cache'
    required: false
    default: 'true'
  version-tags-cache-ttl:
    description: 'Freshness window, in seconds, for persisted git tag lookup results. Set to 0 to disable persistent cache reads and writes.'
    required: false
    default: '21600'
  setup-ruby:
    description: 'Set up Ruby and install this action bundle. Set false only after an earlier invocation in the same job has already done this.'
    required: false
    default: 'true'
  github-token:
    description: 'GitHub token for API access (automatic)'
    required: false
    default: ${{ github.token }}

outputs:
  updates-found:
    description: 'Number of dependency updates found'
    value: ${{ steps.check.outputs.updates-found }}
  major-updates-found:
    description: 'Number of major semantic-version updates found'
    value: ${{ steps.check.outputs.major-updates-found }}
  minor-updates-found:
    description: 'Number of minor semantic-version updates found'
    value: ${{ steps.check.outputs.minor-updates-found }}
  patch-updates-found:
    description: 'Number of patch semantic-version updates found'
    value: ${{ steps.check.outputs.patch-updates-found }}
  updates-json:
    description: 'JSON array of dependency update objects with message plus available package, version, severity, repository, and source fields'
    value: ${{ steps.check.outputs.updates-json }}
  blocked:
    description: 'Whether the run was blocked before version lookup by a security gate such as allow-hosts'
    value: ${{ steps.check.outputs.blocked }}
  error-message:
    description: 'Failure message when blocked is true'
    value: ${{ steps.check.outputs.error-message }}

runs:
  using: 'composite'
  steps:
    - name: Set up Ruby
      if: ${{ inputs.setup-ruby == 'true' }}
      uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f
      env:
        BUNDLE_WITHOUT: development:test${{ inputs.package-manifest-paths != '' && ':xcode' || '' }}
      with:
        ruby-version: '3.3'
        bundler-cache: true
        working-directory: ${{ github.action_path }}

    - name: Prepare version tags cache
      id: version-tags-cache
      if: ${{ inputs.cache-version-tags == 'true' && inputs.version-tags-cache-ttl != '0' }}
      shell: bash
      env:
        CACHE_REPOSITORY_ID: ${{ github.repository_id }}
      run: |
        set -euo pipefail
        cache_day="$(date -u +%Y%m%d)"
        cache_repo="${CACHE_REPOSITORY_ID:-${GITHUB_REPOSITORY:-repository}}"
        cache_dir="${RUNNER_TEMP}/spm-version-updates-tags"
        cache_key="spm-version-updates-tags-${RUNNER_OS}-${cache_repo}-${cache_day}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
        today_restore_key="spm-version-updates-tags-${RUNNER_OS}-${cache_repo}-${cache_day}-"
        restore_key="spm-version-updates-tags-${RUNNER_OS}-${cache_repo}-"

        mkdir -p "$cache_dir"
        echo "SPM_VERSION_UPDATES_TAG_CACHE_DIR=$cache_dir" >> "$GITHUB_ENV"
        echo "path=$cache_dir" >> "$GITHUB_OUTPUT"
        echo "key=$cache_key" >> "$GITHUB_OUTPUT"
        echo "today-restore-key=$today_restore_key" >> "$GITHUB_OUTPUT"
        echo "restore-key=$restore_key" >> "$GITHUB_OUTPUT"

    - name: Restore version tags cache
      if: ${{ inputs.cache-version-tags == 'true' && inputs.version-tags-cache-ttl != '0' }}
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ steps.version-tags-cache.outputs.path }}
        key: ${{ steps.version-tags-cache.outputs.key }}
        restore-keys: |
          ${{ steps.version-tags-cache.outputs.today-restore-key }}
          ${{ steps.version-tags-cache.outputs.restore-key }}

    - name: Check SPM dependencies
      id: check
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        BUNDLE_WITHOUT: development:test${{ inputs.package-manifest-paths != '' && ':xcode' || '' }}
        INPUT_XCODE_PROJECT_PATH: ${{ inputs.xcode-project-path }}
        INPUT_PACKAGE_MANIFEST_PATHS: ${{ inputs.package-manifest-paths }}
        INPUT_PACKAGE_RESOLVED_PATHS: ${{ inputs.package-resolved-paths }}
        INPUT_CHECK_WHEN_EXACT: ${{ inputs.check-when-exact }}
        INPUT_CHECK_BRANCHES: ${{ inputs.check-branches }}
        INPUT_CHECK_REVISIONS: ${{ inputs.check-revisions }}
        INPUT_REPORT_ABOVE_MAXIMUM: ${{ inputs.report-above-maximum }}
        INPUT_REPORT_PRE_RELEASES: ${{ inputs.report-pre-releases }}
        INPUT_IGNORE_REPOS: ${{ inputs.ignore-repos }}
        INPUT_REPO_RULES_PATH: ${{ inputs.repo-rules-path }}
        INPUT_ALLOW_HOSTS: ${{ inputs.allow-hosts }}
        INPUT_FAIL_ON_UPDATES: ${{ inputs.fail-on-updates }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_COMMENT_ON_SUCCESS: ${{ inputs.comment-on-success }}
        INPUT_CACHE_VERSION_TAGS: ${{ inputs.cache-version-tags }}
        INPUT_VERSION_TAGS_CACHE_TTL: ${{ inputs.version-tags-cache-ttl }}
        INPUT_SETUP_RUBY: ${{ inputs.setup-ruby }}
        SPM_VERSION_UPDATES_TAG_CACHE_DIR: ${{ steps.version-tags-cache.outputs.path }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        cd "$ACTION_PATH"
        bash "$ACTION_PATH/lib/action_runtime_preflight.sh"
        bundle exec ruby "$ACTION_PATH/lib/action.rb"

    - name: Save version tags cache
      if: ${{ always() && inputs.cache-version-tags == 'true' && inputs.version-tags-cache-ttl != '0' }}
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ steps.version-tags-cache.outputs.path }}
        key: ${{ steps.version-tags-cache.outputs.key }}
