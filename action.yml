name: 'SPM Version Updates'
description: 'Check for available updates to Swift Package Manager dependencies in Xcode projects or Package.swift manifests'
author: 'hbmartin'
branding:
  icon: 'package'
  color: 'orange'

inputs:
  xcode-project-path:
    description: 'Path to the Xcode project file (.xcodeproj). Provide this OR package-manifest-paths.'
    required: false
    default: ''
  package-manifest-paths:
    description: 'Newline-separated list of Package.swift manifest paths. Provide this OR xcode-project-path.'
    required: false
    default: ''
  package-resolved-paths:
    description: 'Optional newline-separated list of Package.resolved paths. Defaults to a Package.resolved next to each manifest.'
    required: false
    default: ''
  check-when-exact:
    description: 'Check for updates even when using exact version constraints'
    required: false
    default: 'false'
  check-branches:
    description: 'Check for newer commits on branch-pinned dependencies'
    required: false
    default: 'true'
  check-revisions:
    description: 'Report the latest tagged version for revision-pinned dependencies'
    required: false
    default: 'false'
  report-above-maximum:
    description: 'Report versions above the maximum constraint range'
    required: false
    default: 'false'
  report-pre-releases:
    description: 'Include pre-release versions in update reports'
    required: false
    default: 'false'
  ignore-repos:
    description: 'Comma-separated list of repository URLs to ignore'
    required: false
    default: ''
  allow-hosts:
    description: 'Comma-separated list of git remote hostnames allowed for version lookups. Empty allows any host.'
    required: false
    default: ''
  fail-on-updates:
    description: 'Legacy fail behavior. Set true to fail on any update, or major/minor/patch to fail on semantic version updates at or above that severity.'
    required: false
    default: 'false'
  fail-on:
    description: 'Fail on semantic version updates at or above this severity: major, minor, or patch. Overrides fail-on-updates when set.'
    required: false
    default: ''
  comment-on-success:
    description: 'Post a pull request comment when all dependencies are up to date'
    required: false
    default: 'false'
  github-token:
    description: 'GitHub token for API access (automatic)'
    required: false
    default: ${{ github.token }}

outputs:
  updates-found:
    description: 'Number of dependency updates found'
    value: ${{ steps.check.outputs.updates-found }}
  major-updates-found:
    description: 'Number of major semantic-version updates found'
    value: ${{ steps.check.outputs.major-updates-found }}
  minor-updates-found:
    description: 'Number of minor semantic-version updates found'
    value: ${{ steps.check.outputs.minor-updates-found }}
  patch-updates-found:
    description: 'Number of patch semantic-version updates found'
    value: ${{ steps.check.outputs.patch-updates-found }}
  updates-json:
    description: 'JSON array of dependency update objects with message plus available package, version, severity, repository, and source fields'
    value: ${{ steps.check.outputs.updates-json }}

runs:
  using: 'composite'
  steps:
    - name: Set up Ruby
      uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f
      env:
        BUNDLE_WITHOUT: development:test
      with:
        ruby-version: '3.3'
        bundler-cache: true
        working-directory: ${{ github.action_path }}

    - name: Check SPM dependencies
      id: check
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        BUNDLE_WITHOUT: development:test
        INPUT_XCODE_PROJECT_PATH: ${{ inputs.xcode-project-path }}
        INPUT_PACKAGE_MANIFEST_PATHS: ${{ inputs.package-manifest-paths }}
        INPUT_PACKAGE_RESOLVED_PATHS: ${{ inputs.package-resolved-paths }}
        INPUT_CHECK_WHEN_EXACT: ${{ inputs.check-when-exact }}
        INPUT_CHECK_BRANCHES: ${{ inputs.check-branches }}
        INPUT_CHECK_REVISIONS: ${{ inputs.check-revisions }}
        INPUT_REPORT_ABOVE_MAXIMUM: ${{ inputs.report-above-maximum }}
        INPUT_REPORT_PRE_RELEASES: ${{ inputs.report-pre-releases }}
        INPUT_IGNORE_REPOS: ${{ inputs.ignore-repos }}
        INPUT_ALLOW_HOSTS: ${{ inputs.allow-hosts }}
        INPUT_FAIL_ON_UPDATES: ${{ inputs.fail-on-updates }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_COMMENT_ON_SUCCESS: ${{ inputs.comment-on-success }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        cd "$ACTION_PATH"
        bundle exec ruby "$ACTION_PATH/lib/action.rb"
